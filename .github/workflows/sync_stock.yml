name: Stock Watchlist Sync

on:
  schedule:
    - cron: "0 7 * * 1-5"  # 平日 16:00 JST (7:00 UTC) 東証引け後
  workflow_dispatch:        # 手動実行ボタン

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install gspread pandas yfinance google-auth google-auth-oauthlib

      - name: Run stock sync
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: python streamlit_dashboard/stock/sync_kabu.py
