name: Stock Watchlist Sync

on:
  schedule:
    - cron: "0 7 * * 1-5"  # 平日 16:00 JST (7:00 UTC) 東証引け後
  workflow_dispatch:        # 手動実行ボタン

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: uv sync

      - name: Run stock sync
        env:
          GCP_SERVICE_ACCOUNT_JSON: ${{ secrets.GCP_SERVICE_ACCOUNT_JSON }}
        run: uv run python streamlit_dashboard/stock/sync_kabu.py
